version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prediksi_saham_backend
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=*
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prediksi_saham_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
