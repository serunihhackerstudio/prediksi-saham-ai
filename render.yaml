services:
  - type: web
    name: prediksi-saham-backend
    env: python
    region: singapore # Good for Indonesia
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT main:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: ALLOWED_ORIGINS
        value: "*" # To be updated to frontend Vercel URL later
